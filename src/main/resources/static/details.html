<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCheck | Add Settlement</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090B;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00F2EA;
            --secondary: #7D77FF;
            --text-main: #F4F4F5;
            --text-dim: #A1A1AA;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(125, 119, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 234, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            margin-bottom: 32px;
            text-align: left;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-box label {
            font-size: 12px;
            font-weight: 500;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 242, 234, 0.03);
            box-shadow: 0 0 0 4px rgba(0, 242, 234, 0.1);
        }

        input::placeholder { color: rgba(161, 161, 170, 0.4); }

        .btn-container {
            margin-top: 32px;
            grid-column: span 2;
        }

        #addBtn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #addBtn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 242, 234, 0.2);
        }

        #addBtn:active { transform: translateY(0); }


        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
        }

        #myName {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header">
        <h2>Record Settlement</h2>
        <p>Log a new transaction to your FinCheck ledger</p>
    </div>

    <div class="grid">
        <div class="input-box">
            <label>User Identity</label>
            <input type="text" id="myName" placeholder="Your username" readonly>
        </div>

        <div class="input-box">
            <label>Borrower/Lender</label>
            <input type="text" id="otherName" placeholder="Other party name">
        </div>

        <div class="input-box full-width">
            <label>Transaction Amount</label>
            <input type="number" id="amount" placeholder="Amount in ₹">
        </div>

        <div class="input-box">
            <label>Alert (Days Before)</label>
            <input type="number" name="reminderBefore" min="0" id="reminderBefore" placeholder="e.g. 2">
        </div>

        <div class="input-box">
            <label>Alert (Days After)</label>
            <input type="number" name="reminderAfter" min="0" id="reminderAfter" placeholder="e.g. 5">
        </div>

        <div class="input-box full-width">
            <label>Payment Deadline</label>
            <input type="date" id="dueDate">
        </div>

        <div class="btn-container">
            <button id="addBtn">Confirm Settlement</button>
        </div>
    </div>
</div>

<script>
    const userId = localStorage.getItem("userId");
    const token = localStorage.getItem("token");
    if (!token || !userId) {
        window.location.href = "login.html";
    }
    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("myName").value = localStorage.getItem("username");
    });
    document.getElementById("addBtn").addEventListener('click', function() {
        const myName = document.getElementById("myName").value.trim();
        const otherPartyName = document.getElementById("otherName").value.trim();
        const amount = parseFloat(document.getElementById("amount").value.trim());
        const reminderBefore = parseInt(document.getElementById("reminderBefore").value.trim()) || 0;
        const reminderAfter = parseInt(document.getElementById("reminderAfter").value.trim()) || 0;
        const otherPartyEmail = null;
        const dueDate = document.getElementById("dueDate").value;

        if (!myName || !otherPartyName || !amount || amount <= 0 || !dueDate) {
            alert("Please fill all fields correctly.");
            return;
        }

        const details = {
            selfName: myName,
            otherPartyName: otherPartyName,
            amount: amount,
            direction: "I_OWN",
            reminderBefore: reminderBefore,
            reminderAfter: reminderAfter,
            otherPartyEmail: otherPartyEmail,
            dueDate: dueDate
        };

        try {
            fetch("https://debt-tracking-group-expense-splitter.onrender.com/enter-details", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem("token")
                },
                body: JSON.stringify(details)
            })
            .then(response => {
                if (response.ok) {
                    alert("Settlement recorded successfully!");
                    ['myName', 'otherName', 'amount', 'reminderBefore', 'reminderAfter', 'dueDate'].forEach(id => {
                        document.getElementById(id).value = "";
                        document.getElementById("myName").value = localStorage.getItem("username");
                    });
                } else {
                    return response.text().then(text => { throw new Error(text) });
                }
            })
            .catch(err => alert("Error: " + err.message));
        } catch (err) {
            alert("Error: " + err.message);
        }
    });
</script>

</body>
</html>

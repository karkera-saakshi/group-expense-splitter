<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlement Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a15;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --turquoise: #10b981;
            --lavender: #3b82f6;
            --white: #f8fafc;
            --steel: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 10% 10%, rgba(59, 130, 246, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(16, 185, 129, 0.07) 0%, transparent 50%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .settlement-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 52px 44px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--turquoise);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-bottom: 36px;
        }

        .logo-dot {
            width: 5px;
            height: 5px;
            background: var(--turquoise);
            border-radius: 50%;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.2;
            letter-spacing: -0.5px;
            color: var(--white);
        }

        .card-subtitle {
            font-size: 14px;
            color: var(--steel);
            font-weight: 300;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .divider {
            height: 1px;
            background: var(--card-border);
            margin-bottom: 28px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
        }

        .btn-owe {
            background-color: var(--lavender);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.2);
        }

        .btn-owe:hover {
            background: #2563eb;
            box-shadow: 0 10px 24px rgba(59, 130, 246, 0.35);
            transform: translateY(-1px);
        }

        .btn-owed {
            background-color: var(--turquoise);
            color: #050a15;
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.2);
        }

        .btn-owed:hover {
            background: #0ea873;
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.35);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.98);
        }

        .back-link {
            margin-top: 24px;
            display: inline-block;
            color: var(--steel);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #8b5cf6;
        }
    </style>
</head>
<body>

<div class="settlement-card">
    <div class="logo">
        <div class="logo-dot"></div>
        FinCheck
    </div>

    <h2>Keep track of your settlements</h2>
    <p class="card-subtitle">Manage who owes you and whom you owe — with automated email reminders.</p>

    <div class="divider"></div>

    <div class="button-group">
        <button class="btn-owe" onclick="btnOwe()">To pay</button>
        <button class="btn-owed" onclick="btnOwes()" id="whoOwesBtn">To receive</button>
    </div>
    <a href="option.html" class="back-link">← Back to Option</a>
</div>

<script>
    const userId = localStorage.getItem("userId");
    const token = localStorage.getItem("token");
    if (!token || !userId) {
        window.location.href = "login.html";
    }

    function btnOwe() {
        window.location.href = 'whomYouOwe.html';
    }

    document.addEventListener("DOMContentLoaded", function () {
        const btn = document.getElementById("whoOwesBtn");
        btn.addEventListener("click", function () {
            console.log("Button clicked");
            window.location.href = "whoOwesYou.html";
        });
    });
</script>

</body>
</html>

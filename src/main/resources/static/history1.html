<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | Fincheck</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a15;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.12);
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(59, 130, 246, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(16, 185, 129, 0.07) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 48px;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 10, 21, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }

        .back-btn {
            background: var(--surface);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: rgba(16, 185, 129, 0.4);
            color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        /* MAIN */
        .dashboard-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 36px;
        }

        .page-title-group h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .page-title-group h1 span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .page-title-group p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 300;
            margin-top: 4px;
        }

        .summary-bar {
            display: flex;
            gap: 24px;
        }

        .stat-item {
            text-align: right;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            min-width: 120px;
        }

        .stat-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        select {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover {
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.03);
        }

        select option {
            background: #0a1628;
            color: white;
        }

        .table-surface {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 16px 24px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        td {
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        tr:last-child td { border-bottom: none; }

        /* GREEN ROW - paid */
        tr.row-paid td {
            color: #10b981;
            background: rgba(16, 185, 129, 0.04);
        }

        tr.row-paid:hover td {
            background: rgba(16, 185, 129, 0.08);
        }

        /* RED ROW - pending */
        tr.row-pending td {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.04);
        }

        tr.row-pending:hover td {
            background: rgba(239, 68, 68, 0.08);
        }

        .amount-cell {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .paid-style {
            color: #10b981;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .pending-style {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-select {
            background: transparent;
            border: none;
            color: inherit;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            padding-right: 4px;
            outline: none;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 300;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">
        <div class="logo-dot"></div>
        FinCheck
    </div>
    <a href="whomYouOwe.html" class="back-btn">← Back</a>
</nav>

<div class="dashboard-wrapper">
    <header>
        <div class="page-title-group">
            <h1>History <span>/ Transactions</span></h1>
            <p>Track all your payment records and settlement status</p>
        </div>
        <div class="summary-bar">
            <div class="stat-item">
                <span class="stat-label">Total Settled</span>
                <span class="stat-value" id="totalPaid" style="color: var(--accent);">₹0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Pending</span>
                <span class="stat-value" id="yetToPay" style="color: var(--danger);">₹0</span>
            </div>
        </div>
    </header>

    <div class="controls">
        <select id="filterStatus" onchange="loadHistory()">
            <option value="all">All Transactions</option>
            <option value="paid">Settled Only</option>
            <option value="unpaid">Pending Only</option>
        </select>
        <select id="sortTime" onchange="loadHistory()">
            <option value="time_desc">Sort: Newest</option>
            <option value="time_asc">Sort: Oldest</option>
        </select>
        <select id="sortAmount" onchange="loadHistory()">
            <option value="default">Sort: Amount</option>
            <option value="amount_desc">Highest First</option>
            <option value="amount_asc">Lowest First</option>
        </select>
    </div>

    <div class="table-surface">
        <table>
            <thead>
            <tr>
                <th>Recipient</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Status</th>
                <th style="text-align: right;">Actions</th>
            </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>
</div>

<script>
    let allHistory = [];
    const userId = localStorage.getItem("userId");
    const token = localStorage.getItem("token");
    if (!token || !userId) {
        window.location.href = "login.html";
    }

    document.addEventListener('DOMContentLoaded', fetchHistory);

    async function fetchHistory() {
        try {
            const response = await fetch(`http://localhost:8081/histories/${userId}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!response.ok) throw new Error("API Connection Failed");

            let data = await response.json();
            allHistory = data.filter(item => item.direction === "I_OWN");

            renderTable(allHistory);
            updateSummary(allHistory);
        } catch (err) {
            console.error(err);
            alert("Could not load history. Make sure the backend is running and CORS is allowed!");
        }
    }

    function loadHistory() {
        const sortTime = document.getElementById("sortTime").value;
        const sortAmount = document.getElementById("sortAmount").value;
        const filterStatus = document.getElementById("filterStatus").value;

        let filteredData = [...allHistory];

        if (filterStatus === "paid") filteredData = filteredData.filter(i => i.paid);
        if (filterStatus === "unpaid") filteredData = filteredData.filter(i => !i.paid);

        if (sortAmount === "amount_desc") filteredData.sort((a, b) => b.amount - a.amount);
        if (sortAmount === "amount_asc") filteredData.sort((a, b) => a.amount - b.amount);

        if (sortTime === "time_asc") filteredData.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
        if (sortTime === "time_desc") filteredData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        renderTable(filteredData);
        updateSummary(filteredData);
    }

    function renderTable(data) {
        const tbody = document.getElementById("historyTable");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No transactions found</td></tr>`;
            return;
        }

        data.forEach(item => {
            const dateStr = new Date(item.createdAt).toLocaleDateString(undefined, {
                day: '2-digit', month: 'short', year: 'numeric'
            });
            const statusClass = item.paid ? "paid-style" : "pending-style";
            const rowClass = item.paid ? "row-paid" : "row-pending";

            const tr = document.createElement("tr");
            tr.className = rowClass;
            tr.innerHTML = `
                <td>${item.otherPartyName}</td>
                <td class="amount-cell">₹${item.amount.toLocaleString()}</td>
                <td>${dateStr}</td>
                <td>
                    <span class="status-badge ${statusClass}">
                        <select class="status-select" onchange="updateStatus(${item.id}, this.value)">
                            <option value="true" ${item.paid ? "selected" : ""}>Paid</option>
                            <option value="false" ${!item.paid ? "selected" : ""}>Pending</option>
                        </select>
                    </span>
                </td>
                <td style="text-align: right;">
                    <button class="delete-btn" onclick="deleteEntry(${item.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function updateStatus(id, value) {
        try {
            await fetch(`http://localhost:8081/status/${id}?paid=${value}`, {
                method: "PATCH",
                headers: { "Authorization": "Bearer " + token }
            });
            const idx = allHistory.findIndex(i => i.id === id);
            if (idx !== -1) allHistory[idx].paid = (value === "true");
            loadHistory();
        } catch (err) {
            alert("Update failed");
        }
    }

    async function deleteEntry(id) {
        const userId = localStorage.getItem("userId");
        if (!confirm("Confirm deletion of this record?")) return;

        try {
            await fetch(`http://localhost:8081/delete/${userId}/${id}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            allHistory = allHistory.filter(i => i.id !== id);
            loadHistory();
        } catch (err) {
            alert("Delete failed");
        }
    }

    function updateSummary(data) {
        const totalPaid = data.filter(i => i.paid).reduce((sum, i) => sum + i.amount, 0);
        const yetToPay = data.filter(i => !i.paid).reduce((sum, i) => sum + i.amount, 0);

        document.getElementById("totalPaid").innerText = `₹${totalPaid.toLocaleString()}`;
        document.getElementById("yetToPay").innerText = `₹${yetToPay.toLocaleString()}`;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a15;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --turquoise: #10b981;
            --lavender: #3b82f6;
            --cotton-candy: #10b981;
            --steel: #94a3b8;
            --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 420px;
            padding: 52px 48px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--turquoise);
            letter-spacing: -0.3px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--turquoise);
            border-radius: 50%;
        }

        #formSide h1 {
            font-size: 30px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.8px;
            margin-bottom: 6px;
        }

        #formSide .instruction {
            font-size: 14px;
            color: var(--steel);
            font-weight: 300;
            margin-bottom: 40px;
        }

        #loginForm {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
        }

        input:focus {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(16, 185, 129, 0.03);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.07);
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.35);
            font-weight: 300;
        }

        #btn1 {
            margin-top: 8px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: var(--turquoise);
            color: #050a15;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
        }

        #btn1:hover {
            background: #0ea873;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
        }

        #btn1:active {
            transform: translateY(0);
        }

        #footerLink {
            margin-top: 24px;
            font-size: 13px;
            color: var(--steel);
            font-weight: 300;
            text-align: center;
        }

        #footerLink a {
            color: var(--turquoise);
            text-decoration: none;
            font-weight: 500;
        }

        #footerLink a:hover {
            text-decoration: underline;
        }

        .divider {
            height: 1px;
            background: var(--card-border);
            margin: 28px 0;
        }

        .security-note {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(148, 163, 184, 0.5);
            font-weight: 300;
        }

        .security-note::before {
            content: '🔒';
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div id="formSide">
        <div class="logo">
            <div class="logo-dot"></div>
            FinCheck
        </div>

        <h1>Login</h1>
        <p class="instruction">Please enter your credentials.</p>

        <form id="loginForm">
            <div class="field">
                <label class="field-label">Username</label>
                <input type="text" id="username" placeholder="your username" required>
            </div>
            <div class="field">
                <label class="field-label">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="btn1">Log In</button>
        </form>

        <div class="divider"></div>

        <div class="security-note">Secured with JWT authentication</div>

        <p id="footerLink">
            New user? <a href="signup.html">Create an account</a>
        </p>
    </div>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function (event) {
    event.preventDefault();

    const loginData = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("https://debt-tracking-group-expense-splitter.onrender.com/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(loginData)
        });

        if (!response.ok) {
            const errorMessage = await response.text();
            alert(errorMessage);
            return;
        }

        const loggedInUser = await response.json();
        localStorage.setItem("userId", loggedInUser.userId);
        localStorage.setItem("username", loggedInUser.username);
        localStorage.setItem("token", loggedInUser.token);

        window.location.href = "option.html";

    } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong");
    }
});
</script>

</body>
</html>

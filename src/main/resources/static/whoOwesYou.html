<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whom You Owe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a15;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --turquoise: #10b981;
            --cotton-candy: #10b981;
            --steel: #94a3b8;
            --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 10% 10%, rgba(59, 130, 246, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(16, 185, 129, 0.07) 0%, transparent 50%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .header {
            margin-bottom: 32px;
        }

        .category-label {
            color: var(--turquoise);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--white);
        }

        .divider {
            height: 1px;
            background: var(--card-border);
            margin-bottom: 28px;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background-color: var(--turquoise);
            color: #050a15;
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.2);
        }

        .btn-primary:hover {
            background: #0ea873;
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.35);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--steel);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }

        .back-link {
            margin-top: 24px;
            display: inline-block;
            color: var(--steel);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--turquoise);
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="category-label">Receivables</span>
        <h2>To receive</h2>
    </div>

    <div class="divider"></div>

    <div class="button-stack">
        <button class="btn-primary" onclick="btnPrimary()">Enter Details</button>
        <button class="btn-secondary" onclick="btnSecondary()">View Records</button>
    </div>

    <a href="owns.html" class="back-link">← Back to Dashboard</a>
</div>

<script>
    const userId = localStorage.getItem("userId");
    const token = localStorage.getItem("token");
    if (!token || !userId) {
        window.location.href = "login.html";
    }

    function btnPrimary() {
        window.open('details1.html', '_blank');
    }
    function btnSecondary() {
        window.open('history2.html', '_blank');
    }
</script>
</body>
</html>
